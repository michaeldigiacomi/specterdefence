# Custom values for k3s deployment at k3s.digitaladrenalin.net

replicaCount: 2

image:
  repository: ghcr.io/bluedigiacomi/specterdefence
  pullPolicy: IfNotPresent
  tag: "0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "specterdefence"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: specterdefence.digitaladrenalin.net
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: specterdefence-tls
      hosts:
        - specterdefence.digitaladrenalin.net

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - specterdefence
          topologyKey: kubernetes.io/hostname

# Application configuration
config:
  debug: "false"
  host: "0.0.0.0"
  port: "8000"
  databaseUrl: ""  # Set via secrets

# Secrets Configuration
secrets:
  existingSecret:
    enabled: true
    name: "specterdefence-secrets"

  externalSecrets:
    enabled: false

  helmManaged:
    enabled: false

  validation:
    enabled: true
    initContainer:
      enabled: true
      image:
        repository: busybox
        tag: "1.36"
        pullPolicy: IfNotPresent

# Tenant credentials encryption
tenantEncryption:
  rotation:
    enabled: true
    reminderDays: 90
    keyHistory: 3

# Office 365 Audit Log Collector Configuration
collector:
  enabled: true
  schedule: "*/5 * * * *"
  lookbackMinutes: 10
  intervalMinutes: 5
  maxEventsPerBatch: 1000
  debug: "false"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 300
  podAnnotations: {}
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Persistence for SQLite (when using SQLite in production)
persistence:
  enabled: true
  storageClass: "local-path"
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /app/data
