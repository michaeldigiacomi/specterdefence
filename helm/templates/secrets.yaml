{{/*
SpecterDefence Secrets Template
Supports three secret management strategies:
1. Existing Secret (useExisting=true) - Recommended for production
2. External Secrets Operator (externalSecrets.enabled=true) - Cloud-native
3. Helm-managed (helmManaged.enabled=true) - NOT for production
*/}}

{{/*
Option 1: Use an existing secret - no resource created
*/}}
{{- if and .Values.secrets.existingSecret.enabled (not .Values.secrets.externalSecrets.enabled) (not .Values.secrets.helmManaged.enabled) }}
# Using existing secret: {{ .Values.secrets.existingSecret.name }}
# No Secret resource created by Helm
{{- end }}

{{/*
Option 2: External Secrets Operator - creates ExternalSecret CR
*/}}
{{- if .Values.secrets.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "specterdefence.fullname" . }}-external
  labels:
    {{- include "specterdefence.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secrets.externalSecrets.secretStore.name }}
    kind: {{ .Values.secrets.externalSecrets.secretStore.kind }}
  target:
    name: {{ include "specterdefence.fullname" . }}-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          {{- include "specterdefence.labels" . | nindent 10 }}
        annotations:
          # Track secret origin for audit purposes
          external-secrets.io/managed-by: "external-secrets"
          external-secrets.io/secret-store: {{ .Values.secrets.externalSecrets.secretStore.name | quote }}
  data:
    {{- range .Values.secrets.externalSecrets.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property }}
        {{- end }}
        {{- if .remoteRef.version }}
        version: {{ .remoteRef.version }}
        {{- end }}
    {{- end }}
{{- end }}

{{/*
Option 3: Helm-managed secret - creates standard Secret resource
WARNING: Not recommended for production - secrets visible in Helm values
*/}}
{{- if .Values.secrets.helmManaged.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "specterdefence.fullname" . }}-secrets
  labels:
    {{- include "specterdefence.labels" . | nindent 4 }}
  annotations:
    # Mark as Helm-managed for transparency
    helm.sh/managed-by: {{ .Release.Service }}
    specterdefence.io/secret-type: "helm-managed"
    specterdefence.io/warning: "NOT-FOR-PRODUCTION"
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.helmManaged.secretKey | quote }}
  {{- if .Values.secrets.helmManaged.databaseUrl }}
  DATABASE_URL: {{ .Values.secrets.helmManaged.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.helmManaged.encryptionKey }}
  ENCRYPTION_KEY: {{ .Values.secrets.helmManaged.encryptionKey | quote }}
  {{- end }}
  {{- if .Values.secrets.helmManaged.o365ClientSecret }}
  O365_CLIENT_SECRET: {{ .Values.secrets.helmManaged.o365ClientSecret | quote }}
  {{- end }}
{{- end }}

{{/*
Tenant Credentials Secret
Stores encrypted tenant OAuth credentials
This secret is created empty and populated by the application
*/}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "specterdefence.fullname" . }}-tenant-credentials
  labels:
    {{- include "specterdefence.labels" . | nindent 4 }}
  annotations:
    # Description of secret purpose
    specterdefence.io/secret-purpose: "encrypted-tenant-credentials"
    specterdefence.io/encryption: "fernet"
type: Opaque
stringData:
  # Placeholder - actual credentials encrypted and stored by application
  # Each entry: tenant_id -> encrypted_credential_bundle
  tenants.json: "{}"
