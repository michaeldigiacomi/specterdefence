apiVersion: v2
name: specterdefence
description: A Helm chart for SpecterDefence M365 Security Platform
type: application
version: 0.2.0
appVersion: "0.1.0"
home: https://github.com/bluedigiacomi/specterdefence
sources:
  - https://github.com/bluedigiacomi/specterdefence
maintainers:
  - name: Blue DiGiacomi
    email: blue@digitaladrenalin.net
keywords:
  - security
  - microsoft365
  - fastapi
  - react

# Helm dependencies
# PostgreSQL and Redis are managed as subcharts for easier deployment
dependencies:
  # PostgreSQL - Primary database for SpecterDefence
  - name: postgresql
    version: 15.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
    tags:
      - database
  
  # Redis - Used for caching and session storage
  - name: redis
    version: 19.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
    tags:
      - cache

annotations:
  category: Security
  licenses: MIT
