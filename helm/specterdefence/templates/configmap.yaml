{{/*
ConfigMap for non-sensitive configuration
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "specterdefence.fullname" . }}-config
  labels:
    {{- include "specterdefence.labels" . | nindent 4 }}
data:
  # Application environment
  ENVIRONMENT: {{ .Values.global.environment | quote }}
  
  # API Configuration
  DEBUG: {{ .Values.api.config.debug | quote }}
  HOST: {{ .Values.api.config.host | quote }}
  PORT: {{ .Values.api.config.port | quote }}
  LOG_LEVEL: {{ .Values.api.config.logLevel | quote }}
  REQUEST_TIMEOUT: {{ .Values.api.config.requestTimeout | quote }}
  CORS_ORIGINS: {{ .Values.api.config.corsOrigins | quote }}
  
  # Domain
  DOMAIN: {{ .Values.global.domain | quote }}
  
  # Redis configuration (if enabled)
  {{- if .Values.redis.enabled }}
  REDIS_ENABLED: "true"
  REDIS_URL: {{ include "specterdefence.redisUrl" . | quote }}
  {{- else }}
  REDIS_ENABLED: "false"
  {{- end }}
  
  # Collector configuration
  {{- if .Values.collector.enabled }}
  COLLECTOR_SCHEDULE: {{ .Values.collector.schedule | quote }}
  COLLECTOR_LOOKBACK_MINUTES: {{ .Values.collector.lookbackMinutes | quote }}
  COLLECTOR_INTERVAL_MINUTES: {{ .Values.collector.intervalMinutes | quote }}
  COLLECTOR_MAX_EVENTS: {{ .Values.collector.maxEventsPerBatch | quote }}
  {{- end }}
