{{/*
Combined Ingress for API and Frontend
*/}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "specterdefence.fullname" . }}
  labels:
    {{- include "specterdefence.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.global.domain | quote }}
        {{- range .Values.ingress.api.extraHosts }}
        - {{ . | quote }}
        {{- end }}
        {{- range .Values.ingress.frontend.extraHosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName }}
    {{- range .Values.ingress.tls.extra }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  
  rules:
    - host: {{ .Values.global.domain | quote }}
      http:
        paths:
          # API paths first (more specific)
          {{- range .Values.ingress.api.extraPaths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "specterdefence.apiFullname" $ }}
                port:
                  number: {{ $.Values.api.service.port }}
          {{- end }}
          
          # Default API path
          {{- if .Values.api.enabled }}
          - path: {{ .Values.ingress.api.path }}
            pathType: {{ .Values.ingress.api.pathType }}
            backend:
              service:
                name: {{ include "specterdefence.apiFullname" . }}
                port:
                  number: {{ .Values.api.service.port }}
          {{- end }}
          
          # Frontend paths
          {{- range .Values.ingress.frontend.extraPaths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "specterdefence.frontendFullname" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
          {{- end }}
          
          # Default frontend path (catch-all)
          {{- if .Values.frontend.enabled }}
          - path: {{ .Values.ingress.frontend.path }}
            pathType: {{ .Values.ingress.frontend.pathType }}
            backend:
              service:
                name: {{ include "specterdefence.frontendFullname" . }}
                port:
                  number: {{ .Values.frontend.service.port }}
          {{- end }}
    
    # Additional hosts for API
    {{- range .Values.ingress.api.extraHosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "specterdefence.apiFullname" $ }}
                port:
                  number: {{ $.Values.api.service.port }}
    {{- end }}
    
    # Additional hosts for frontend
    {{- range .Values.ingress.frontend.extraHosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "specterdefence.frontendFullname" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
    {{- end }}
{{- end }}
