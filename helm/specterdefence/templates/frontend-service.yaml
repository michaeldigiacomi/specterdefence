{{/*
Frontend Service
*/}}
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "specterdefence.frontendFullname" . }}
  labels:
    {{- include "specterdefence.frontendLabels" . | nindent 4 }}
  {{- with .Values.frontend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "specterdefence.frontendSelectorLabels" . | nindent 4 }}
{{- end }}
