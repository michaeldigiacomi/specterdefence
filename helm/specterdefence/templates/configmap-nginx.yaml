{{/*
Nginx Configuration ConfigMap for Frontend
*/}}
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "specterdefence.frontendFullname" . }}-nginx
  labels:
    {{- include "specterdefence.frontendLabels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;
        
        # Client max body size
        client_max_body_size {{ .Values.frontend.nginx.clientMaxBodySize }};
        
        # Proxy timeout
        proxy_read_timeout {{ .Values.frontend.nginx.proxyTimeout }}s;
        proxy_send_timeout {{ .Values.frontend.nginx.proxyTimeout }}s;
        
        {{- if .Values.frontend.nginx.gzip }}
        # Enable gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
        {{- end }}
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # API proxy to backend
        location /api/ {
            proxy_pass http://{{ include "specterdefence.apiFullname" . }}:{{ .Values.api.service.port }}/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout {{ .Values.frontend.nginx.proxyTimeout }}s;
            proxy_send_timeout {{ .Values.frontend.nginx.proxyTimeout }}s;
        }
        
        # Handle SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        {{- if .Values.frontend.nginx.extraConfig }}
        # Additional configuration
        {{ .Values.frontend.nginx.extraConfig | nindent 8 }}
        {{- end }}
    }
{{- end }}
