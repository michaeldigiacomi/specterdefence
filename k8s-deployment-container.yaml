apiVersion: v1
kind: Namespace
metadata:
  name: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/part-of: specterdefence
---
# NOTE: If using SQLite with multiple pods, you will have password persistence issues.
# For multi-pod deployments, use PostgreSQL (see k8s/postgres.yaml)
# The PVC below is only suitable for single-pod SQLite deployments.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: specterdefence-data
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: specterdefence
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: specterdefence
spec:
  # WARNING: Using SQLite with replicas > 1 will cause password persistence issues.
  # Each pod will have its own database, leading to inconsistent state.
  # For multi-pod deployments, use PostgreSQL (see k8s/postgres.yaml)
  # OR set replicas: 1 for SQLite deployments.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: specterdefence
  template:
    metadata:
      labels:
        app.kubernetes.io/name: specterdefence
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: specterdefence
    spec:
      imagePullSecrets:
        - name: ghcr-registry-secret
      containers:
        - name: specterdefence
          image: ghcr.io/digiacomi-shared/specterdefence:v1.1.2-datetime-fix
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DEBUG
              value: "false"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            # DATABASE_URL format:
            # SQLite (single pod only): sqlite:///app/data/specterdefence.db
            # PostgreSQL (multi-pod): postgresql+asyncpg://user:pass@host:5432/dbname
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: SECRET_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: ENCRYPTION_KEY
            - name: KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: KIMI_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          # Note: These volume mounts are primarily for SQLite database storage.
          # When using PostgreSQL, you can remove these mounts unless you need
          # persistent storage for other application data.
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: specterdefence-data
---
apiVersion: v1
kind: Service
metadata:
  name: specterdefence
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: specterdefence
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: specterdefence
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: specterdefence
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: specterdefence
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - specterdefence.digitaladrenalin.net
      secretName: specterdefence-tls
  rules:
    - host: specterdefence.digitaladrenalin.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: specterdefence
                port:
                  number: 80
---
# HTTP to HTTPS redirect
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: specterdefence-http
  namespace: specterdefence
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: specterdefence-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: specterdefence.digitaladrenalin.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: specterdefence
                port:
                  number: 80
