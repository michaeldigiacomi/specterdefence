apiVersion: apps/v1
kind: Deployment
metadata:
  name: specterdefence-backend
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/component: backend
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: specterdefence
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: specterdefence
        app.kubernetes.io/component: backend
        environment: production
    spec:
      imagePullSecrets:
        - name: ghcr-registry-secret
      containers:
        - name: specterdefence-backend
          image: ghcr.io/digiacomi-shared/specterdefence-backend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DEBUG
              value: "false"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: DATABASE_URL
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: ENCRYPTION_KEY
            - name: KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: KIMI_API_KEY
            - name: API_URL
              value: "http://specterdefence-backend:8000"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: specterdefence-backend
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/component: backend
    environment: production
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000