apiVersion: apps/v1
kind: Deployment
metadata:
  name: specterdefence-frontend
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/component: frontend
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: specterdefence
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: specterdefence
        app.kubernetes.io/component: frontend
        environment: production
    spec:
      imagePullSecrets:
        - name: ghcr-registry-secret
      containers:
        - name: specterdefence-frontend
          image: ghcr.io/michaeldigiacomi/specterdefence-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          env:
            - name: VITE_API_URL
              value: "/api/v1"
            - name: VITE_WS_URL
              value: "ws://specterdefence-backend:8000/ws"
---
apiVersion: v1
kind: Service
metadata:
  name: specterdefence-frontend
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/component: frontend
    environment: production
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80