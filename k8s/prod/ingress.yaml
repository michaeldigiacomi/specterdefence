apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: specterdefence-marketing
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence-marketing
    environment: production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - specterdefence.digitaladrenalin.net
      secretName: specterdefence-tls
  rules:
    - host: specterdefence.digitaladrenalin.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: specterdefence-marketing
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: specterdefence-app
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence-app
    environment: production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Note: Challenge might fail if DNS points to Tailscale
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - app.specterdefence.digitaladrenalin.net
      secretName: specterdefence-app-tls
  rules:
    - host: app.specterdefence.digitaladrenalin.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: specterdefence-backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: specterdefence-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: specterdefence-frontend
                port:
                  number: 80
---
# Traefik Middleware: Redirect all HTTP traffic to HTTPS
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    environment: production
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTP Ingress — redirects to HTTPS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: specterdefence-http
  namespace: specterdefence
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: specterdefence-redirect-to-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: specterdefence.digitaladrenalin.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: specterdefence-marketing
                port:
                  number: 80
    - host: app.specterdefence.digitaladrenalin.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: specterdefence-frontend
                port:
                  number: 80