apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: specterdefence
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    environment: production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - specterdefence.digitaladrenalin.net
      secretName: specterdefence-tls
  rules:
    - host: specterdefence.digitaladrenalin.net
      http:
        paths:
          # API routes -> backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: specterdefence-backend
                port:
                  number: 8000
          # WebSocket -> backend
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: specterdefence-backend
                port:
                  number: 8000
          # Everything else -> frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: specterdefence-frontend
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: specterdefence-http
  namespace: specterdefence
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: specterdefence.digitaladrenalin.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: specterdefence-backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: specterdefence-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: specterdefence-frontend
                port:
                  number: 80