apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: specterdefence

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

images:
  - name: ghcr.io/digiacomi-shared/specterdefence
    newTag: latest  # This will be overridden by ArgoCD or CI/CD

commonLabels:
  app.kubernetes.io/name: specterdefence
  app.kubernetes.io/part-of: specterdefence

# Optional: Add configmap/secret generators if needed
# configMapGenerator:
#   - name: specterdefence-config
#     literals:
#       - DEBUG=false
#       - PORT=8000
