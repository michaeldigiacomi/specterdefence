name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # =============================================================================
  # LINT JOB - ZERO TOLERANCE FOR LINTING ERRORS
  # =============================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    # Ruff linting - STRICT: Zero tolerance for any errors
    # --exit-non-zero-on-fix ensures CI fails even if ruff auto-fixes something
    - name: Lint with ruff
      run: |
        echo "=== Running Ruff Linting (STRICT MODE) ==="
        ruff check . --exit-non-zero-on-fix
        echo "✅ Ruff linting passed"

    # Ruff import sorting check
    - name: Check import sorting with ruff
      run: |
        echo "=== Checking Import Sorting ==="
        ruff check . --select I --exit-non-zero-on-fix
        echo "✅ Import sorting passed"

    # Black formatting - STRICT: Must be perfectly formatted
    - name: Check formatting with black
      run: |
        echo "=== Checking Black Formatting ==="
        black --check --diff .
        echo "✅ Black formatting passed"

    # Mypy type checking - STRICT: All type errors fail the build
    - name: Type check with mypy
      run: |
        echo "=== Running MyPy Type Checking (STRICT MODE) ==="
        mypy src/ tests/ --strict
        echo "✅ Type checking passed"

    # Bandit security scan
    - name: Security scan with bandit
      run: |
        echo "=== Running Bandit Security Scan ==="
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/ --exit-zero
        echo "✅ Security scan completed (check artifacts for issues)"

    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json
        if-no-files-found: ignore

  # =============================================================================
  # TEST JOB
  # =============================================================================
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests with coverage
      run: |
        pytest tests/ -v \
          --cov=src \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=75 \
          --strict-markers

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.12'
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

  # =============================================================================
  # INTEGRATION TESTS
  # =============================================================================
  test-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run integration tests
      run: |
        pytest tests/integration/ -v -m integration --tb=short

  # =============================================================================
  # DOCKER BUILD
  # =============================================================================
  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: specterdefence:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # =============================================================================
  # PRE-COMMIT HOOK VALIDATION
  # =============================================================================
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run pre-commit hooks
      run: |
        pre-commit run --all-files --show-diff-on-failure
