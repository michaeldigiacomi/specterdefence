name: Deploy to Kubernetes

# Required secrets to configure in GitHub repository:
# - GHCR_TOKEN: GitHub token with packages:write permission (use GITHUB_TOKEN)
# - KUBE_CONFIG: Base64-encoded kubeconfig for the cluster
#
# For GHCR image pull access, create a registry secret in the cluster:
# kubectl create secret docker-registry ghcr-registry-secret \
#   --docker-server=https://ghcr.io \
#   --docker-username=github.actor \
#   --docker-password=${{ secrets.GITHUB_TOKEN }} \
#   --docker-email=your-email@example.com

on:
  push:
    branches: [ main ]
  push:
    branches-ignore: [ main ]
    tags-ignore: [ 'v*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: digiacomi-shared/specterdefence

jobs:
  # ============================================
  # Build and Push (common for both prod and dev)
  # ============================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      sha-tag: ${{ steps.sha-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short

      - name: Generate SHA tag
        id: sha-tag
        run: |
          echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

  # ============================================
  # Deploy to Production (main branch)
  # ============================================
  deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Create production namespace
        run: |
          kubectl create namespace specterdefence --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply k8s manifests
        run: |
          kubectl apply -k ./k8s/prod/ --server-side

      - name: Update deployment image
        run: |
          kubectl set image deployment/specterdefence \
            specterdefence=${{ needs.build.outputs.sha-tag }} \
            -n specterdefence

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/specterdefence -n specterdefence --timeout=300s

      - name: Show deployment status
        run: |
          kubectl get pods,svc -n specterdefence

  # ============================================
  # Deploy to Development (non-main branches)
  # ============================================
  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    needs: build
    environment: development
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Create development namespace
        run: |
          kubectl create namespace specterdefence-dev --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply k8s manifests from dev directory
        run: |
          kubectl apply -k ./k8s/dev/ --server-side

      - name: Update deployment image for dev
        run: |
          kubectl set image deployment/specterdefence-dev \
            specterdefence=${{ needs.build.outputs.sha-tag }} \
            -n specterdefence-dev

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/specterdefence-dev -n specterdefence-dev --timeout=300s

      - name: Show deployment status
        run: |
          kubectl get pods,svc -n specterdefence-dev