name: Build Windows Agent

on:
  push:
    branches: [ "main" ]
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore agent/SpecterAgent/SpecterAgent.csproj

    - name: Publish Agent
      run: |
        dotnet publish agent/SpecterAgent/SpecterAgent.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          /p:PublishSingleFile=true `
          /p:PublishTrimmed=false `
          -o ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpecterAgent-win-x64
        path: ./publish/SpecterAgent.exe
