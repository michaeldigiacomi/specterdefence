name: Frontend CI/CD

on:
  push:
    branches: [ main ]
  push:
    branches-ignore: [ main ]
    tags-ignore: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: digiacomi-shared/specterdefence-frontend

jobs:
  # ============================================
  # Lint & Test
  # ============================================
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Run lint
        working-directory: ./frontend
        run: npm run lint || echo "Lint issues found (non-blocking)"

      - name: Run type check
        working-directory: ./frontend
        run: npm run typecheck || echo "Type issues found (non-blocking)"

      - name: Run tests
        working-directory: ./frontend
        run: npm run test -- --coverage --passWithNoTests

  # ============================================
  # Build and Push
  # ============================================
  build:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}
          platforms: linux/amd64

  # ============================================
  # Deploy
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v1
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "namespace=specterdefence" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "namespace=specterdefence-dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Kubernetes
        run: |
          NAMESPACE=${{ steps.env.outputs.namespace }}
          IMAGE_TAG=${{ needs.build.outputs.image-tag }}
          
          # Create namespace if it doesn't exist
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
          
          # Apply secrets (you may need to update these)
          # kubectl apply -f k8s/${{ steps.env.outputs.env }}/ -n $NAMESPACE
          
          # Update image in deployment
          kubectl set image deployment/specterdefence-frontend \
            specterdefence-frontend=$IMAGE_TAG \
            -n $NAMESPACE

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/specterdefence-frontend \
            -n ${{ steps.env.outputs.namespace }} \
            --timeout=5m