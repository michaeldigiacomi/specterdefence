name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Stage 1: Lint
  # ============================================
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true  # Informational only - don't block
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install linting dependencies
        run: |
          pip install black ruff mypy

      - name: Run Ruff (linter)
        run: ruff check src/ || echo "Lint issues found (non-blocking)"

      - name: Run Black (format check)
        run: black --check src/ || echo "Format issues found (non-blocking)"

      - name: Run MyPy (type check)
        run: mypy src/ || echo "Type issues found (non-blocking)"

  # ============================================
  # Stage 2: Test (runs in parallel with lint)
  # ============================================
  test:
    runs-on: ubuntu-latest
    # Removed 'needs: lint' so tests run even if lint fails
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx faker

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ============================================
  # Stage 3a: Build Backend (Parallel)
  # ============================================
  build-backend:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
          buildkitd-flags: --debug

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false  # Don't push yet, just build with cache
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=backend-${{ github.ref_name }}
            type=gha,scope=backend-main
          cache-to: type=gha,mode=max,scope=backend-${{ github.ref_name }}
          platforms: linux/amd64

  # ============================================
  # Stage 3b: Build Frontend (Parallel)
  # ============================================
  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
          buildkitd-flags: --debug

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false  # Don't push yet, just build with cache
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=frontend-${{ github.ref_name }}
            type=gha,scope=frontend-main
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}
          platforms: linux/amd64

  # ============================================
  # Stage 4: Push Images
  # ============================================
  push:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------- Backend Push ----------
      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: |
            type=gha,scope=backend-${{ github.ref_name }}
            type=gha,scope=backend-main
          platforms: linux/amd64

      # ---------- Frontend Push ----------
      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: |
            type=gha,scope=frontend-${{ github.ref_name }}
            type=gha,scope=frontend-main
          platforms: linux/amd64

      - name: Output image details
        run: |
          echo "Backend Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend"
          echo "Frontend Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend"
          echo "Backend Tags: ${{ steps.meta-backend.outputs.tags }}"
          echo "Frontend Tags: ${{ steps.meta-frontend.outputs.tags }}"

  # ============================================
  # Alternative: Combined Build (for PRs)
  # ============================================
  build-combined:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
          buildkitd-flags: --debug

      - name: Build backend (PR check)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          cache-from: |
            type=gha,scope=backend-${{ github.ref_name }}
            type=gha,scope=backend-main
          cache-to: type=gha,mode=max,scope=backend-${{ github.ref_name }}
          platforms: linux/amd64

      - name: Build frontend (PR check)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: |
            type=gha,scope=frontend-${{ github.ref_name }}
            type=gha,scope=frontend-main
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}
          platforms: linux/amd64
