name: Backend CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: digiacomi-shared/specterdefence-backend

jobs:
  # ============================================
  # Lint & Test
  # ============================================
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx faker black ruff mypy

      - name: Run Ruff (linter)
        run: ruff check src/ || echo "Lint issues found (non-blocking)"

      - name: Run Black (format check)
        run: black --check src/ || echo "Format issues found (non-blocking)"

      - name: Run MyPy (type check)
        run: mypy src/ || echo "Type issues found (non-blocking)"

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ============================================
  # Build and Push
  # ============================================
  build:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=backend-${{ github.ref_name }}
          platforms: linux/amd64

  # ============================================
  # Deploy (main branch only)
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v1
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to Kubernetes
        run: |
          IMAGE_TAG=${{ needs.build.outputs.image-tag }}
          
          # Apply secrets (you may need to update these)
          # kubectl apply -f k8s/prod/ -n specterdefence
          
          # Update image in deployment
          kubectl set image deployment/specterdefence-backend \
            specterdefence-backend=$IMAGE_TAG \
            -n specterdefence

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/specterdefence-backend \
            -n specterdefence \
            --timeout=5m