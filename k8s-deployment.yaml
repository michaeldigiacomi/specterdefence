# SpecterDefence k3s Deployment
# This deployment uses a Python base image with all dependencies pre-installed

apiVersion: v1
kind: ConfigMap
metadata:
  name: specterdefence-app
  namespace: specterdefence
data:
  startup.sh: |
    #!/bin/sh
    set -e
    
    echo "=== SpecterDefence Startup ==="
    echo "Python version: $(python --version)"
    echo "Working directory: $(pwd)"
    
    # Ensure data directory exists
    mkdir -p /app/data
    mkdir -p /app/.local
    
    export PYTHONUSERBASE=/app/.local
    export PATH=$PATH:/app/.local/bin
    
    # Check if dependencies are installed
    if ! python -c "import fastapi" 2>/dev/null; then
      echo "Installing dependencies..."
      pip install --user --no-cache-dir \
        fastapi==0.104.1 \
        uvicorn[standard]==0.24.0 \
        pydantic==2.5.0 \
        pydantic-settings==2.1.0 \
        httpx==0.25.2 \
        python-jose[cryptography]==3.3.0 \
        passlib[bcrypt]==1.7.4 \
        python-multipart==0.0.6 \
        sqlalchemy==2.0.23 \
        aiosqlite==0.19.0 \
        asyncpg==0.29.0 \
        alembic==1.12.1 \
        msal==1.28.0 \
        cryptography==41.0.7 \
        aiofiles==23.2.1 \
        tenacity==8.2.3 \
        python-dotenv==1.0.0 \
        haversine==2.8.1
      echo "Dependencies installed successfully"
    else
      echo "Dependencies already installed"
    fi
    
    echo "Starting application..."
    cd /app
    exec python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --proxy-headers
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: specterdefence
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
    app.kubernetes.io/instance: specterdefence
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: specterdefence
      app.kubernetes.io/instance: specterdefence
  template:
    metadata:
      labels:
        app.kubernetes.io/name: specterdefence
        app.kubernetes.io/instance: specterdefence
    spec:
      containers:
        - name: specterdefence
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command:
            - /bin/sh
            - /app/startup.sh
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 10
            failureThreshold: 6
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          env:
            - name: DEBUG
              value: "false"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: DATABASE_URL
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: ENCRYPTION_KEY
            - name: KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: specterdefence-secrets
                  key: KIMI_API_KEY
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: app-source
              mountPath: /app/src
            - name: data
              mountPath: /app/data
            - name: local-deps
              mountPath: /app/.local
            - name: startup-script
              mountPath: /app/startup.sh
              subPath: startup.sh
      volumes:
        - name: app-source
          hostPath:
            path: /opt/specterdefence/src
            type: Directory
        - name: data
          persistentVolumeClaim:
            claimName: specterdefence-data
        - name: local-deps
          emptyDir: {}
        - name: startup-script
          configMap:
            name: specterdefence-app
            defaultMode: 0755
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: specterdefence-data
  namespace: specterdefence
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
---
apiVersion: v1
kind: Service
metadata:
  name: specterdefence
  namespace: specterdefence
  labels:
    app.kubernetes.io/name: specterdefence
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: specterdefence
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: specterdefence
  namespace: specterdefence
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: specterdefence.k3s.digitaladrenalin.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: specterdefence
                port:
                  number: 80
